<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atomic Structure</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Roboto+Mono:wght@400;700&family=Roboto+Serif:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Spark Learning companion tokens */
    --bgMain: #F7F3EE;
    --bgPanel: #FFFFFF;
    --bgCard: #FFFFFF;
    --accentBlue: #6366f1;
    --accentBlueHover: #4f46e5;
    --accentPurple: #a855f7;
    --accentGreen: #10b981;
    --accentRed: #ef4444;
    --accentYellow: #f59e0b;
    --textPrimary: #1C1917;
    --textSecondary: #57534E;
    --textWarm: #2A2520;
    --textWarmSecondary: #7C6F5A;
    --textWarmMuted: #A0937B;
    --borderColor: #E8E0D2;
    --borderSubtle: #F0EBE3;
    --shadow-sm: 0 1px 2px rgba(17,17,17,0.04), 0 1px 3px rgba(17,17,17,0.06);
    --shadow-md: 0 4px 12px rgba(17,17,17,0.06), 0 2px 4px rgba(17,17,17,0.04);
    --shadow-lg: 0 16px 40px rgba(17,17,17,0.10), 0 4px 12px rgba(17,17,17,0.06);
    --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    --font-serif: 'Roboto Serif', Georgia, Cambria, serif;
    --font-mono: 'Roboto Mono', monospace;
    /* preserved student-copy note artifact */
    --note-bg: #fdf1c6;
    --note-ink: #2a1e08;
    --note-head: #7a3a00;
    /* domain colors */
    --proton: #ef4444;
    --neutron: #94a3b8;
    --electron: #6366f1;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--bgMain);
    color: var(--textPrimary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 12px 32px 8px;
    max-width: 1340px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }
  header .titles .eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accentBlue);
    margin-bottom: 3px;
  }
  header .titles h1 {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 20px;
    color: var(--textWarm);
    margin: 0;
    letter-spacing: 0.2px;
  }
  .step-indicator {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--textWarmMuted);
    white-space: nowrap;
  }
  .progress-track {
    max-width: 1340px;
    margin: 0 auto;
    padding: 0 32px;
  }
  .progress-track .bar {
    height: 4px;
    background: var(--borderSubtle);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-track .fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accentBlue), var(--accentPurple));
    border-radius: 999px;
    transition: width 350ms ease;
  }
  .step-line { display: flex; align-items: baseline; justify-content: space-between; gap: 14px; margin-bottom: 8px; }
  .step-line .now { display: flex; align-items: baseline; gap: 10px; min-width: 0; }
  .step-line .num {
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--accentBlue); white-space: nowrap;
  }
  .step-line .ttl {
    font-family: var(--font-serif); font-size: 14px; font-weight: 700; color: var(--textWarm);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .step-line .count {
    font-family: var(--font-mono); font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; color: var(--textWarmMuted); white-space: nowrap;
  }
  main {
    max-width: 1340px;
    margin: 0 auto;
    padding: 12px 32px 20px;
  }
  .workspace {
    display: grid;
    grid-template-columns: minmax(0, 1.55fr) minmax(340px, 0.92fr);
    gap: 26px;
    align-items: stretch;
  }
  /* ---- stage (what students SEE) ---- */
  .stage {
    background: var(--bgCard);
    border: 1px solid var(--borderColor);
    border-top: 4px solid var(--accentBlue);
    border-radius: 16px;
    box-shadow: var(--shadow-md);
    padding: 16px 18px;
    min-height: 440px;
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.4s ease-out;
  }
  .stage-label {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accentBlue);
    margin-bottom: 12px;
  }
  .stage-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
  canvas { display: block; width: 100%; height: auto; border-radius: 12px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* ---- side (what students WRITE) ---- */
  .side { display: flex; flex-direction: column; gap: 14px; }
  .notes-card {
    background: var(--note-bg);
    color: var(--note-ink);
    padding: 16px 22px 14px;
    border-radius: 14px;
    font-size: 15px;
    line-height: 1.58;
    box-shadow: var(--shadow-sm);
    animation: fadeUp 0.4s ease-out;
  }
  .notes-card .nc-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--note-head);
    margin-bottom: 6px;
  }
  .step-heading {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 17px;
    color: var(--note-head);
    margin-bottom: 6px;
  }
  .notes-card p { margin: 0; }
  .notes-card strong { font-weight: 700; color: var(--note-ink); }

  .notebook-prompt {
    background: #fff;
    border: 1px solid var(--borderColor);
    border-left: 4px solid var(--accentBlue);
    border-radius: 12px;
    padding: 13px 16px;
    display: flex;
    align-items: flex-start;
    gap: 11px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--textSecondary);
    box-shadow: var(--shadow-sm);
  }
  .notebook-prompt .np-tag {
    flex-shrink: 0;
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 4px 8px;
    background: var(--accentBlue);
    color: #fff;
    border-radius: 6px;
    margin-top: 1px;
  }
  .notebook-prompt strong { color: var(--textPrimary); font-weight: 700; }

  nav {
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding-top: 4px;
  }
  button {
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 600;
    padding: 11px 20px;
    border-radius: 10px;
    border: 1px solid var(--borderColor);
    background: #fff;
    color: var(--textPrimary);
    cursor: pointer;
    transition: background 140ms, border-color 140ms, transform 50ms, box-shadow 140ms;
  }
  button:hover:not(:disabled) { background: var(--bgMain); border-color: var(--textWarmMuted); }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  button.primary {
    background: var(--accentBlue);
    color: #fff;
    border-color: var(--accentBlue);
    box-shadow: 0 4px 14px rgba(99,102,241,0.28);
  }
  button.primary:hover:not(:disabled) { background: var(--accentBlueHover); border-color: var(--accentBlueHover); }
  .btn-group { display: flex; gap: 10px; }

  /* ---- shared interactive bits ---- */
  .tool-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .chip {
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--borderColor);
    background: #fff;
    color: var(--textPrimary);
    cursor: pointer;
    transition: all 140ms;
  }
  .chip:hover { border-color: var(--accentBlue); }
  .chip.active { background: var(--accentBlue); color: #fff; border-color: var(--accentBlue); }
  .readout {
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
  }
  .eyebrow-sm {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--textWarmMuted);
  }
  .answer-pill {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #166534;
    background: rgba(16,185,129,0.14);
    padding: 4px 10px;
    border-radius: 999px;
  }

  /* difficulty pills on practice questions */
  .diff-pill {
    display: inline-block; font-family: var(--font-mono); font-size: 9px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 7px; border-radius: 999px;
    margin: 0 6px; vertical-align: middle;
  }
  .diff-simple { color: #166534; background: rgba(16,185,129,0.14); }
  .diff-challenge { color: #9a3412; background: rgba(245,158,11,0.16); }

  /* element lookup */
  .lookup {
    display: flex; flex-direction: column; align-items: center; gap: 18px;
  }
  .nuclear-symbol {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: var(--font-serif);
  }
  .ns-stack { display: flex; flex-direction: column; align-items: flex-end; line-height: 1; }
  .ns-mass { font-size: 22px; font-weight: 700; color: var(--textWarm); }
  .ns-num { font-size: 18px; font-weight: 700; color: var(--accentRed); }
  .ns-sym { font-size: 76px; font-weight: 700; color: var(--accentBlue); line-height: 0.9; }
  .lookup .el-name { font-family: var(--font-serif); font-size: 22px; font-weight: 700; color: var(--textWarm); }
  .pne-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 460px; }
  .pne-cell {
    background: var(--bgMain);
    border: 1px solid var(--borderColor);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .pne-cell .big { font-family: var(--font-mono); font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .pne-cell .lab { font-size: 11px; font-weight: 600; color: var(--textSecondary); margin-top: 2px; }
  .slider-row { display: flex; align-items: center; gap: 14px; width: 100%; max-width: 460px; }
  input[type=range] { flex: 1; accent-color: var(--accentBlue); height: 4px; }
  .stepper-btn { width: 40px; height: 40px; border-radius: 10px; font-size: 20px; font-weight: 700; padding: 0; }

  /* particle counter table */
  table.counter { width: 100%; border-collapse: collapse; font-size: 14px; }
  table.counter th {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--textWarmMuted); font-weight: 700; padding: 8px 6px; text-align: center; border-bottom: 1px solid var(--borderColor);
  }
  table.counter td { padding: 8px 6px; text-align: center; border-bottom: 1px solid var(--borderSubtle); }
  table.counter td.sym { font-family: var(--font-serif); font-size: 18px; font-weight: 700; color: var(--textWarm); text-align: left; }
  table.counter input {
    width: 56px; text-align: center; font-family: var(--font-mono); font-size: 15px; font-weight: 700;
    padding: 7px 4px; border: 1px solid var(--borderColor); border-radius: 8px; background: #fff; color: var(--textPrimary);
  }
  table.counter input:focus { outline: 2px solid var(--accentBlue); outline-offset: -1px; border-color: var(--accentBlue); }
  table.counter input.ok { background: rgba(16,185,129,0.12); border-color: var(--accentGreen); color: #166534; }
  table.counter input.no { background: rgba(239,68,68,0.10); border-color: var(--accentRed); }

  /* calculators */
  .calc-grid { display: grid; gap: 10px; }
  .iso-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; font-weight: 600; color: var(--textSecondary); }
  .field input {
    font-family: var(--font-mono); font-size: 15px; font-weight: 700; padding: 9px 10px;
    border: 1px solid var(--borderColor); border-radius: 8px; background: #fff; color: var(--textPrimary);
  }
  .field input:focus { outline: 2px solid var(--accentBlue); outline-offset: -1px; }
  .calc-steps {
    background: var(--bgMain); border: 1px solid var(--borderColor); border-radius: 12px;
    padding: 14px 16px; font-family: var(--font-mono); font-size: 14px; line-height: 1.9; color: var(--textPrimary);
    min-height: 60px;
  }
  .calc-steps .res { color: var(--accentGreen); font-weight: 700; }
  .calc-steps .muted { color: var(--textWarmMuted); }

  /* reveal pattern (Check for Understanding + walkthrough) */
  .reveal-btn {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--accentBlue); color: #fff; border: none; border-radius: 999px;
    font-weight: 700; font-size: 13px; padding: 8px 15px; cursor: pointer;
  }
  .reveal-btn:hover { background: var(--accentBlueHover); }
  .reveal-content {
    margin-top: 10px; padding: 12px 14px; background: var(--bgMain);
    border: 1px solid var(--borderColor); border-left: 4px solid var(--accentGreen);
    border-radius: 10px; font-size: 14px; line-height: 1.55; color: var(--textPrimary);
    animation: fadeUp 0.25s ease-out;
  }
  .reveal-content[hidden] { display: none !important; }
  .q-card { background: #fff; border: 1px solid var(--borderColor); border-radius: 12px; padding: 14px 16px; box-shadow: var(--shadow-sm); }
  .q-card + .q-card { margin-top: 12px; }
  .q-card .q-text { font-weight: 600; font-size: 14.5px; margin-bottom: 10px; }
  .q-num { font-family: var(--font-mono); color: var(--accentBlue); font-weight: 700; margin-right: 6px; }

  .summary-card {
    background: #fff; border: 1px solid var(--borderColor); border-radius: 14px;
    padding: 14px 18px; box-shadow: var(--shadow-sm); border-left: 4px solid var(--accentPurple);
  }
  .summary-card .sc-tag { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accentPurple); margin-bottom: 4px; }
  .summary-card p { margin: 0; font-size: 14px; line-height: 1.55; color: var(--textPrimary); }

  .pb-progress { margin-top: 4px; }
  .pb-bar { height: 5px; background: var(--borderSubtle); border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
  .pb-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accentBlue), var(--accentGreen)); transition: width 300ms ease; }
  .pb-text { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--textWarmMuted); }
  .pb-text.complete { color: #166534; }

  .hint { font-size: 12px; color: var(--textWarmMuted); text-align: center; font-style: italic; }
  .caption { font-style: italic; font-size: 12px; color: var(--textWarmMuted); text-align: center; }
  .spectrum-readout { font-family: var(--font-mono); font-size: 13px; text-align: center; color: var(--textSecondary); min-height: 18px; }

  @media (max-width: 980px) {
    .workspace { grid-template-columns: 1fr; }
    .stage { min-height: 380px; }
  }
</style>
</head>
<body>
<header>
  <div class="titles">
    <div class="eyebrow">Chemistry</div>
    <h1>Atomic Structure</h1>
  </div>
</header>
<div class="progress-track">
  <div class="step-line">
    <span class="now"><span class="num" id="stepNum">Step 01</span><span class="ttl" id="stepTitle"></span></span>
    <span class="count" id="stepIndicator">01 / 12</span>
  </div>
  <div class="bar"><div class="fill" id="progressFill"></div></div>
</div>

<main>
  <div class="workspace">
    <div class="stage">
      <div class="stage-label" id="stageLabel">What you see</div>
      <div class="stage-body" id="stage"></div>
    </div>

    <div class="side">
      <div class="notes-card">
        <div class="nc-tag">📝 Copy Into Your Notes</div>
        <div class="step-heading" id="stepHeading"></div>
        <p id="notes"></p>
      </div>
      <div class="notebook-prompt">
        <div class="np-tag">✎ DO</div>
        <div id="notebookText"></div>
      </div>
      <nav>
        <button id="resetBtn">Start Over</button>
        <div class="btn-group">
          <button id="prevBtn">← Back</button>
          <button id="nextBtn" class="primary">Next →</button>
        </div>
      </nav>
    </div>
  </div>
</main>

<script>
// =====================================================
//  Data
// =====================================================
const ELEMENTS = {
  1:{s:'H',n:'Hydrogen',m:1.008}, 2:{s:'He',n:'Helium',m:4.003},
  3:{s:'Li',n:'Lithium',m:6.94}, 4:{s:'Be',n:'Beryllium',m:9.012},
  5:{s:'B',n:'Boron',m:10.81}, 6:{s:'C',n:'Carbon',m:12.011},
  7:{s:'N',n:'Nitrogen',m:14.007}, 8:{s:'O',n:'Oxygen',m:15.999},
  9:{s:'F',n:'Fluorine',m:18.998}, 10:{s:'Ne',n:'Neon',m:20.180},
  11:{s:'Na',n:'Sodium',m:22.990}, 12:{s:'Mg',n:'Magnesium',m:24.305},
  13:{s:'Al',n:'Aluminium',m:26.982}, 14:{s:'Si',n:'Silicon',m:28.085},
  15:{s:'P',n:'Phosphorus',m:30.974}, 16:{s:'S',n:'Sulfur',m:32.06},
  17:{s:'Cl',n:'Chlorine',m:35.45}, 18:{s:'Ar',n:'Argon',m:39.948},
  19:{s:'K',n:'Potassium',m:39.098}, 20:{s:'Ca',n:'Calcium',m:40.078},
  26:{s:'Fe',n:'Iron',m:55.845}, 29:{s:'Cu',n:'Copper',m:63.546},
  35:{s:'Br',n:'Bromine',m:79.904}, 38:{s:'Sr',n:'Strontium',m:87.62},
  56:{s:'Ba',n:'Barium',m:137.327}
};
function shellsFor(z) {
  const caps = [2, 8, 8, 2];
  const out = [];
  let rem = z;
  for (const c of caps) { const e = Math.min(rem, c); out.push(e); rem -= e; if (rem <= 0) break; }
  return out;
}

// =====================================================
//  Helpers
// =====================================================
const $ = (sel, root=document) => root.querySelector(sel);
function el(tag, attrs={}, kids=[]) {
  const n = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') n.className = attrs[k];
    else if (k === 'html') n.innerHTML = attrs[k];
    else if (k.startsWith('on') && typeof attrs[k] === 'function') n.addEventListener(k.slice(2), attrs[k]);
    else n.setAttribute(k, attrs[k]);
  }
  (Array.isArray(kids) ? kids : [kids]).forEach(c => { if (c != null) n.append(c.nodeType ? c : document.createTextNode(c)); });
  return n;
}
function makeCanvas(stage, w, h) {
  const c = el('canvas');
  c.width = w; c.height = h;
  c.style.maxWidth = (w) + 'px';
  c.style.margin = '0 auto';
  stage.append(c);
  return { c, ctx: c.getContext('2d') };
}
function canvasPos(c, e) {
  const r = c.getBoundingClientRect();
  return { x: (e.clientX - r.left) * c.width / r.width, y: (e.clientY - r.top) * c.height / r.height };
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.arcTo(x+w, y, x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r); ctx.arcTo(x, y, x+w, y, r); ctx.closePath();
}
// approximate visible-wavelength to RGB (380-720nm)
function wavelengthToRGB(wl) {
  let r=0, g=0, b=0;
  if (wl >= 380 && wl < 440) { r = -(wl-440)/60; b = 1; }
  else if (wl < 490) { g = (wl-440)/50; b = 1; }
  else if (wl < 510) { g = 1; b = -(wl-510)/20; }
  else if (wl < 580) { r = (wl-510)/70; g = 1; }
  else if (wl < 645) { r = 1; g = -(wl-645)/65; }
  else if (wl <= 720) { r = 1; }
  const f = wl < 420 ? 0.3 + 0.7*(wl-380)/40 : wl > 700 ? 0.3 + 0.7*(720-wl)/20 : 1;
  const ch = v => Math.round(255 * Math.pow(Math.max(0, Math.min(1, v)) * f, 0.8));
  return `rgb(${ch(r)},${ch(g)},${ch(b)})`;
}

// =====================================================
//  Animation loop (current scene may register a tick)
// =====================================================
let currentTick = null;
let lastTs = null;
function loop(ts) {
  if (lastTs == null) lastTs = ts;
  const dt = Math.min(50, ts - lastTs);
  lastTs = ts;
  if (currentTick) currentTick(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// =====================================================
//  Electron-cloud atom renderer
//  Shells are clickable rings, but electrons buzz around
//  sporadically (probability cloud), not on clean orbits.
// =====================================================
const RADII = [46, 82, 118, 154];

function drawNucleus(ctx, cx, cy, protons, neutrons) {
  const ng = ctx.createRadialGradient(cx-6, cy-6, 2, cx, cy, 32);
  ng.addColorStop(0, '#fca5a5'); ng.addColorStop(1, '#ef4444');
  ctx.fillStyle = ng;
  ctx.beginPath(); ctx.arc(cx, cy, 27, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '700 12px Roboto Mono, monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(`${protons}p`, cx, cy - 7);
  ctx.fillText(`${neutrons}n`, cx, cy + 8);
}

class ElectronCloud {
  constructor(cx, cy) { this.cx = cx; this.cy = cy; this.shells = [[],[],[],[]]; }
  setCounts(counts) {
    for (let i = 0; i < 4; i++) {
      const want = counts[i] || 0;
      const arr = this.shells[i];
      while (arr.length < want) arr.push({
        ang: Math.random()*Math.PI*2,
        av: (Math.random()-0.5)*0.03,
        rPhase: Math.random()*Math.PI*2,
        rSpeed: 0.6 + Math.random()*0.9,
        jx: 0, jy: 0, trail: []
      });
      while (arr.length > want) arr.pop();
    }
  }
  update(dt) {
    const f = dt * 0.06;
    for (let i = 0; i < 4; i++) {
      const dir = (i % 2) ? -1 : 1;
      // Pull from the nucleus weakens outward (distance + shielding by inner shells),
      // so inner electrons are held tight and wander little; outer ones roam more.
      const buzz = 0.8 + i * 1.15;
      for (const p of this.shells[i]) {
        // random walk on angular velocity -> sporadic, not clockwork (outer shells drift more)
        p.av += (Math.random()-0.5) * (0.010 + i*0.006);
        p.av = Math.max(-0.07, Math.min(0.07, p.av)) * 0.94;
        p.ang += p.av + dir * 0.0009 * f;
        p.rPhase += 0.004 * p.rSpeed * f;
        // bee-buzz jitter — amplitude grows with shell number (less nuclear pull)
        p.jx = (p.jx + (Math.random()-0.5)*buzz) * 0.82;
        p.jy = (p.jy + (Math.random()-0.5)*buzz) * 0.82;
      }
    }
  }
  occupiedShell() { return this.shells.reduce((m,a,i)=> a.length ? i : m, -1); }
  draw(ctx, opts={}) {
    const occ = this.occupiedShell();
    // cloud bands + dashed clickable ring guides
    if (opts.rings !== false) for (let i = 0; i < 4; i++) {
      if (!this.shells[i].length) continue;
      const r = RADII[i];
      const isVal = opts.valence && i === occ;
      const col = isVal ? '168,85,247' : '99,102,241';
      const bIn = r - 15, bOut = r + 15;
      const grad = ctx.createRadialGradient(this.cx, this.cy, bIn, this.cx, this.cy, bOut);
      grad.addColorStop(0, `rgba(${col},0)`);
      grad.addColorStop(0.5, `rgba(${col},0.12)`);
      grad.addColorStop(1, `rgba(${col},0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(this.cx, this.cy, bOut, 0, Math.PI*2);
      ctx.arc(this.cx, this.cy, bIn, 0, Math.PI*2, true);
      ctx.fill();
      ctx.strokeStyle = isVal ? 'rgba(168,85,247,0.5)' : 'rgba(99,102,241,0.32)';
      ctx.setLineDash([3,6]); ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.arc(this.cx, this.cy, r, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }
    // electrons (with fading buzz trail)
    for (let i = 0; i < 4; i++) {
      const r = RADII[i];
      const isVal = opts.valence && i === occ;
      const core = isVal ? '#a855f7' : '#6366f1';
      const glow = isVal ? '168,85,247' : '129,140,248';
      const rAmp = 6 + i * 5; // outer shells breathe wider in/out — looser hold
      for (const p of this.shells[i]) {
        const rr = r + Math.sin(p.rPhase) * rAmp;
        const ex = this.cx + Math.cos(p.ang)*rr + p.jx;
        const ey = this.cy + Math.sin(p.ang)*rr + p.jy;
        p.trail.unshift({x:ex, y:ey}); if (p.trail.length > 6) p.trail.pop();
        for (let k = p.trail.length-1; k > 0; k--) {
          const tp = p.trail[k]; const a = (1 - k/p.trail.length) * 0.22;
          ctx.fillStyle = `rgba(${glow},${a})`;
          ctx.beginPath(); ctx.arc(tp.x, tp.y, 4.5, 0, Math.PI*2); ctx.fill();
        }
        const g = ctx.createRadialGradient(ex, ey, 0, ex, ey, 12);
        g.addColorStop(0, `rgba(${glow},0.6)`); g.addColorStop(1, `rgba(${glow},0)`);
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(ex, ey, 12, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = core; ctx.beginPath(); ctx.arc(ex, ey, 5.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.font = '700 8px Roboto Mono, monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('-', ex, ey);
      }
    }
  }
}

// ---- Step 1: Bridge from the Flame Test Lab ----
scenes.push({
  step: 'Step 1: From the Flame Test Lab',
  seeLabel: 'Flame test → atom',
  heading: 'Step 1: What Happened in the Lab',
  notes: "You just ran the <strong>flame test lab</strong>, where every metal ion burned its own color. Here is why. An atom is a tiny <strong>nucleus</strong> of <strong>protons and neutrons</strong> circled by moving <strong>electrons</strong>. The flame's <strong>heat</strong> bumps an outer electron up, then it <strong>falls back</strong> and releases that energy as light, a <strong>photon</strong>. How far it falls sets the color, so each element emits its own <strong>signature color</strong>.",
  notebook: "Pick the ion you tested in the lab and press <strong>Heat the flame</strong>. Watch one outer electron absorb the heat, jump up a level, then fall back down and release light, and record the color. Then, <strong>before you read the notes</strong>, predict in one sentence why each metal ion makes a different color, and check it against the notes.",
  build(stage) {
    const ions = {
      Li:{z:3, col:'#dc2626', name:'crimson red', wl:671},
      Na:{z:11, col:'#f59e0b', name:'yellow-orange', wl:589},
      K:{z:19, col:'#a855f7', name:'lilac', wl:404},
      Ca:{z:20, col:'#f97316', name:'orange-red', wl:622},
      Cu:{z:29, col:'#10b981', name:'blue-green', wl:515, n:34},
      Sr:{z:38, col:'#ef4444', name:'scarlet red', wl:650},
      Ba:{z:56, col:'#84cc16', name:'apple green', wl:524, n:82}
    };
    let active = 'Na';
    const CX = 190, CY = 156, FLX = 452, FLY = 286;
    const { c, ctx } = makeCanvas(stage, 520, 312);
    const ease = x => x<0.5 ? 2*x*x : 1-Math.pow(-2*x+2,2)/2;
    const cloud = new ElectronCloud(CX, CY);
    const S = 0.72;   // scale the atom so the excited level fits above the outer shell
    let phase = 'rest', t = 0, burn = 0, excite = 0, photon = null;
    function drawFlame(bx,by,col,bright,time){
      ctx.fillStyle='#44403c'; roundRect(ctx,bx-20,by,40,26,4); ctx.fill();
      ctx.fillStyle='#292524'; roundRect(ctx,bx-8,by-26,16,28,3); ctx.fill();
      const baseY=by-22, peak=44+bright*92;
      for(let layer=0;layer<3;layer++){
        const w=30-layer*8, h=peak-layer*22, flick=Math.sin(time/120+layer)*4;
        const grad=ctx.createLinearGradient(bx,baseY,bx,baseY-h);
        grad.addColorStop(0, layer===0?'rgba(99,102,241,0.5)':col);
        grad.addColorStop(0.5,col); grad.addColorStop(1,'rgba(255,255,255,0)');
        ctx.globalAlpha=(layer===2?0.95:0.6)*(0.3+bright*0.7); ctx.fillStyle=grad;
        ctx.beginPath(); ctx.moveTo(bx-w/2,baseY);
        ctx.quadraticCurveTo(bx-w/2+flick,baseY-h*0.6,bx+flick,baseY-h);
        ctx.quadraticCurveTo(bx+w/2-flick,baseY-h*0.6,bx+w/2,baseY);
        ctx.closePath(); ctx.fill();
      }
      ctx.globalAlpha=1;
    }
    const status = el('div',{style:'font-family:var(--font-sans);font-size:14.5px;font-weight:600;color:var(--textPrimary);text-align:center;min-height:22px;line-height:1.45'});
    function restStatus(){ const f=ions[active]; status.innerHTML = `<strong style="color:${f.col}">${ELEMENTS[f.z].n}</strong> burns ${f.name} (${f.wl} nm) — press <strong>Heat the flame</strong>.`; }
    const chips = el('div',{class:'tool-row'}, Object.keys(ions).map(k => el('button',{
      class:'chip'+(k===active?' active':''), 'data-k':k,
      onclick(){ active=k; chips.querySelectorAll('.chip').forEach(ch=>ch.classList.toggle('active',ch.dataset.k===k)); phase='rest'; t=0; burn=0; excite=0; photon=null; restStatus(); }
    }, k)));
    const heatBtn = el('button',{class:'primary'},'Heat the flame ↑');
    heatBtn.addEventListener('click',()=>{ if(phase==='rest'){ phase='rising'; t=0; } });
    currentTick = (dt) => {
      const f=ions[active], time=performance.now();
      ctx.clearRect(0,0,c.width,c.height);
      const RAD=[46,82,118,154,190]; const occ = shellsFor(f.z).length-1, outerR = RAD[occ], destR = RAD[occ+1];

      // excite -> hold -> heat removed -> fall -> emit
      if(phase==='rising'){ t=Math.min(1,t+dt/650); excite=ease(t); status.textContent='Heat on — an outer electron absorbs energy and jumps up a level.'; if(t>=1){phase='excited';t=0;} }
      else if(phase==='excited'){ t=Math.min(1,t+dt/600); excite=1; status.textContent='Excited and unstable — the heat is holding it up here.'; if(t>=1){phase='falling';t=0;} }
      else if(phase==='falling'){ t=Math.min(1,t+dt/650); excite=1-ease(t); status.textContent='Heat removed — it falls back down and releases light.'; if(t>=1){ phase='rest'; t=0; burn=1; photon={t:0, sx:CX, sy:CY-outerR*S}; } }

      // flame: hot/orange while heating, signature color on emission, small idle otherwise
      let fcol, fbright;
      if(phase==='rising'||phase==='excited'){ fcol='#fb923c'; fbright=0.85; }
      else if(burn>0){ fcol=f.col; fbright=burn; }
      else { fcol=f.col; fbright=0.16; }
      drawFlame(FLX,FLY,fcol,fbright,time);

      // ----- atom group, scaled so the excited level sits cleanly above the outer shell -----
      ctx.save(); ctx.translate(CX,CY); ctx.scale(S,S); ctx.translate(-CX,-CY);
      // all shells drawn up front (occupied + the next empty one) so NOTHING new appears on heat;
      // the valence shell glows purple, the empty destination brightens as the electron rises into it
      for(let i=0;i<=occ+1;i++){ const r=RAD[i]; if(!r) continue;
        const isDest=i===occ+1, isVal=i===occ;
        const a = isDest ? (0.20+0.5*excite) : isVal ? 0.5 : 0.32;
        ctx.strokeStyle = isVal ? `rgba(168,85,247,${a})` : `rgba(99,102,241,${a})`;
        ctx.setLineDash([3,7]); ctx.lineWidth=1.4; ctx.beginPath(); ctx.arc(CX,CY,r,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]); }
      drawNucleus(ctx,CX,CY,f.z, f.n ?? (Math.round(ELEMENTS[f.z].m)-f.z));
      // during the cycle, lift one valence electron out of the cloud so it can be the hot one
      const counts = shellsFor(f.z).slice();
      const animating = phase!=='rest';
      if(animating && counts[occ]>0) counts[occ]-=1;
      cloud.setCounts(counts); cloud.update(dt); cloud.draw(ctx,{valence:true, rings:false});
      if(animating){
        const rHot = outerR + (destR-outerR)*excite;
        const hx = CX + Math.sin(time/110)*4, hy = CY - rHot;   // rides up the top, keeps a little buzz
        ctx.strokeStyle='rgba(168,85,247,0.45)'; ctx.lineWidth=2; ctx.setLineDash([3,5]);
        ctx.beginPath(); ctx.moveTo(CX, CY-outerR); ctx.lineTo(CX, CY-destR); ctx.stroke(); ctx.setLineDash([]);
        const g=ctx.createRadialGradient(hx,hy,0,hx,hy,16); g.addColorStop(0,'rgba(168,85,247,0.75)'); g.addColorStop(1,'rgba(168,85,247,0)');
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(hx,hy,16,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#a855f7'; ctx.beginPath(); ctx.arc(hx,hy,7,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#fff'; ctx.font='700 9px Roboto Mono'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('-',hx,hy);
      }
      ctx.restore();

      // emitted photon travels to the flame
      if(photon){
        photon.t=Math.min(1,photon.t+dt/700);
        const tx=FLX, ty=212;
        const px=photon.sx+(tx-photon.sx)*photon.t, py=photon.sy+(ty-photon.sy)*photon.t;
        const ang=Math.atan2(ty-photon.sy, tx-photon.sx), pcol=wavelengthToRGB(Math.max(405,Math.min(680,f.wl)));
        ctx.save(); ctx.shadowColor=pcol; ctx.shadowBlur=12; ctx.strokeStyle=pcol; ctx.lineWidth=3; ctx.beginPath();
        for(let k=0;k<11;k++){ const wob=Math.sin(k*0.9+time/70)*5; const xx=px-Math.cos(ang)*k*6+Math.cos(ang+Math.PI/2)*wob, yy=py-Math.sin(ang)*k*6+Math.sin(ang+Math.PI/2)*wob; k===0?ctx.moveTo(xx,yy):ctx.lineTo(xx,yy); }
        ctx.stroke(); ctx.restore();
        if(photon.t>=1){ photon=null;
          status.innerHTML = `Light out — the flame glows <strong style="color:${f.col}">${f.name}</strong>, ${ELEMENTS[f.z].n}'s signature color.`; }
      }
      if(burn>0) burn=Math.max(0,burn-dt/1300);
      heatBtn.disabled = phase!=='rest' || !!photon;
    };
    stage.append(chips, el('div',{class:'tool-row',style:'margin-top:2px'},[heatBtn]), status,
      el('div',{class:'caption'},"Match your unknown's flame color to one of these to identify it."));
    restStatus();
  }
});

scenes.push({

  notes: "Electrons live in <strong>shells</strong> (energy levels), not fixed orbits. Shells fill from the inside out: 1st holds <strong>2</strong>, 2nd holds <strong>8</strong>, 3rd holds <strong>8</strong> (first 20 elements). Calcium fills as <strong>2, 8, 8, 2</strong>. The electrons in the <strong>outer shell are the valence electrons</strong>, the ones that form bonds.",
  notebook: "Build <strong>Sodium</strong> (2, 8, 1) and <strong>Calcium</strong> (2, 8, 8, 2). Draw both, label each shell's count, and circle the <strong>valence electrons</strong>. Then <strong>hypothesize</strong>: the outer electrons buzz wider and feel less pull from the nucleus, why? (Hint: count how many electrons sit between the outer electron and the nucleus.)",
  build(stage) {
    const atoms = [3,6,8,11,12,17,19,20];

    const chips = el('div', { class:'tool-row' }, atoms.map(a => el('button', {
      type:'button', class: 'chip' + (a===z?' active':''), 'data-z':a,
      onclick(){ z=a; placed=[0,0,0,0]; chips.querySelectorAll('.chip').forEach(ch=>ch.classList.toggle('active', +ch.dataset.z===z)); render(); }
    }, ELEMENTS[a].s)));
    const reset = el('button', { type:'button' }, 'Reset electrons');
    reset.addEventListener('click', () => { placed=[0,0,0,0]; render(); });
    const target = () => shellsFor(z);
    const totalPlaced = () => placed.reduce((a,b)=>a+b,0);
    const outerOcc = () => placed.reduce((m,v,i)=> v>0 ? i : m, -1);
    function render() {
      const tg = target();
      const done = totalPlaced() === z && tg.every((v,i)=>v===(placed[i]||0));
      if (totalPlaced() === 0) status.innerHTML = `Click a shell cloud to drop an electron in. ${ELEMENTS[z].s} needs <strong>${z}</strong> electrons.`;
      else if (done) status.innerHTML = `<span class="answer-pill">Correct</span> &nbsp;${ELEMENTS[z].n}: ${tg.join(', ')}`;
      else status.innerHTML = `Placed ${totalPlaced()} of ${z}. Current: ${placed.slice(0, Math.max(1, outerOcc()+1)).join(', ')||'0'}`;
      const occ = outerOcc();

        : `Valence electrons: <span class="readout">${placed[occ]}</span> &nbsp;(outer shell, energy level ${occ+1})`;
    }

    const nShells = () => shellsFor(z).length;
    // shells fill inside-out: the next shell to fill is the first one not yet at capacity

    c.addEventListener('click', (ev) => {

// ---- Step 4: Quantized energy levels (ladder) ----
scenes.push({

  notes: "In the flame test, heat pushed electrons <strong>up</strong> this ladder; now watch them fall. The rungs are <strong>fixed energy levels</strong> with unequal gaps. The <strong>farther</strong> an electron falls, the <strong>more energy</strong> the light carries: its <strong>wavelength gets shorter</strong> and its <strong>frequency gets higher</strong>, sliding the color from <strong>red toward violet (ROYGBIV)</strong>. A small fall gives long-wavelength, low-frequency <strong>red</strong>; a big fall gives short-wavelength, high-frequency <strong>violet</strong>.",
  notebook: "Do a <strong>small</strong> fall and a <strong>big</strong> fall. For each, record the <strong>wavelength</strong>, the <strong>frequency</strong>, and the <strong>color</strong>. Then finish the rule: as the fall distance increases, wavelength ___, frequency ___, and the color moves toward ___.",
  build(stage) {
    const { c, ctx } = makeCanvas(stage, 520, 330);
    const NMAX = 5;
    // hand-tuned unequal spacing: big gap low down, gaps shrink upward but never crowd
    const LY = { 1:296, 2:186, 3:116, 4:72, 5:42 };
    const yOf = n => LY[n];
    let level = 1, anim = null, lastWL = null, prevWL = null, wavePhase = 0;
    const EX = 150;
    // emission color: bigger drop = more energy = shorter (bluer) wavelength
    const dropWL = (hi, lo) => {
      const dE = (1/(lo*lo)) - (1/(hi*hi));
      const norm = Math.max(0, Math.min(1, (dE - 0.02)/(0.96 - 0.02)));
      return Math.round(680 - norm*270); // 410 violet .. 680 red
    };
    const colorName = wl => wl<430?'violet':wl<480?'blue':wl<510?'blue-green':wl<565?'green':wl<590?'yellow':wl<625?'orange':'red';
    const up = el('button', { class:'primary' }, 'Absorb (jump up) ↑');
    const down = el('button', {}, 'Emit (fall down) ↓');
    function start(to, dir){ if(anim) return; anim = { from: level, to, t:0, dir, wl: dir==='emit'?dropWL(level,to):null }; }
    up.addEventListener('click', () => { if(level<NMAX && !anim) start(level+1,'absorb'); });
    down.addEventListener('click', () => { if(level>1 && !anim){ const to = 1 + Math.floor(Math.random()*(level-1)); start(to,'emit'); } });
    const status = el('div', { class:'spectrum-readout', style:'min-height:18px' }, 'Absorb a photon to climb, then Emit and watch the light.');
    // ROYGBIV reference bar with a live marker
    const marker = el('div',{style:'position:absolute;top:-3px;width:3px;height:22px;background:#1c1917;box-shadow:0 0 0 2px #fff;border-radius:2px;left:0%;transition:left 220ms ease'});
    const bar = el('div',{style:'position:relative;height:16px;border-radius:8px;background:linear-gradient(to right,#ff2d2d,#ff8a00,#ffe000,#39d353,#2ec5ff,#6a5cff,#b14bff)'},[marker]);
    const specWrap = el('div',{style:'margin-top:8px'},[
      el('div',{style:'display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:9px;color:var(--textWarmMuted);margin-bottom:3px'},[el('span',{},'700 nm · low f · red'), el('span',{},'violet · high f · 400 nm')]),
      bar ]);
    const inquiry = el('div',{class:'caption',style:'margin-top:8px;padding:9px 12px;font-size:11.5px;border:1px solid rgba(168,85,247,0.35);border-radius:10px;background:rgba(168,85,247,0.06);text-align:left;line-height:1.45'});
    inquiry.innerHTML = '<strong style="color:var(--accentPurple)">Inquiry:</strong> Do several jumps, some small and some big. As the electron falls a <strong>greater distance</strong>, watch the wave: what happens to the <strong>wavelength</strong>, to the <strong>frequency</strong> (how fast it wiggles), and which way does the color slide along <strong>ROYGBIV</strong>? Write the pattern before you move on.';
    currentTick = (dt) => {
      ctx.clearRect(0,0,c.width,c.height);
      // ----- energy ladder (left) -----
      for (let n=1;n<=NMAX;n++){
        const y = yOf(n);
        ctx.strokeStyle = 'rgba(99,102,241,0.40)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(60,y); ctx.lineTo(250,y); ctx.stroke();
        ctx.fillStyle = '#7C6F5A'; ctx.font='600 13px Inter, sans-serif'; ctx.textAlign='right'; ctx.textBaseline='middle';
        ctx.fillText('n = '+n, 52, y);
        if (n===1){ ctx.fillStyle='#A0937B'; ctx.font='italic 10px Inter'; ctx.textAlign='left'; ctx.fillText('ground state', 90, y+14); }
      }
      let curY = yOf(level);
      if (anim) {
        anim.t = Math.min(1, anim.t + dt/(anim.dir==='emit'?520:600));
        const ease = anim.t<0.5 ? 2*anim.t*anim.t : 1-Math.pow(-2*anim.t+2,2)/2;
        curY = yOf(anim.from) + (yOf(anim.to)-yOf(anim.from))*ease;
        const col = anim.wl ? wavelengthToRGB(anim.wl) : '#f59e0b';
        const yA = yOf(anim.from), yB = yOf(anim.to), adir = anim.to>anim.from ? -1 : 1;
        ctx.strokeStyle = col; ctx.lineWidth = 3; ctx.globalAlpha = 0.85;
        ctx.beginPath(); ctx.moveTo(264, yA); ctx.lineTo(264, yB); ctx.stroke();
        ctx.fillStyle = col; ctx.beginPath(); ctx.moveTo(264, yB); ctx.lineTo(259, yB-8*adir); ctx.lineTo(269, yB-8*adir); ctx.closePath(); ctx.fill();
        ctx.globalAlpha = 1;
        if (anim.t >= 1) {
          level = anim.to;
          if (anim.dir === 'emit') {
            prevWL = lastWL; lastWL = anim.wl;
            const dist = anim.from - anim.to, f = (3000/anim.wl).toFixed(1), col2 = wavelengthToRGB(anim.wl);
            const wlA = prevWL==null?'':(anim.wl<prevWL?' <span style="color:#166534">↓ shorter</span>':anim.wl>prevWL?' <span style="color:#9a3412">↑ longer</span>':' = same');
            const fA  = prevWL==null?'':(anim.wl<prevWL?' <span style="color:#166534">↑ higher</span>':anim.wl>prevWL?' <span style="color:#9a3412">↓ lower</span>':' = same');
            status.innerHTML = `Fell <strong>n=${anim.from}→${anim.to}</strong> (${dist} level${dist>1?'s':''}) · λ <strong style="color:${col2}">${anim.wl} nm</strong>${wlA} · f <strong>${f}×10¹⁴ Hz</strong>${fA} · <strong style="color:${col2}">${colorName(anim.wl)}</strong>`;
            marker.style.left = Math.max(0,Math.min(100,(700-anim.wl)/300*100)) + '%';
          } else {
            status.innerHTML = `Absorbed a photon → now in <strong>n=${level}</strong>. Higher rung, more energy stored — ready to fall.`;
          }
          anim = null;
        }
      }
      // ----- emitted-light wave (right): wavelength + frequency you can SEE -----
      const WX0=300, WX1=506, WY=120, A=24;
      ctx.fillStyle='#57534E'; ctx.font='700 10px Roboto Mono'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
      ctx.fillText('EMITTED LIGHT', (WX0+WX1)/2, WY-A-14);
      if (lastWL) {
        const col = wavelengthToRGB(lastWL);
        const pxPerCycle = lastWL/13;                 // shorter wavelength -> tighter wave
        wavePhase += dt * 0.004 * (600/lastWL);       // higher frequency -> faster wiggle
        ctx.strokeStyle = col; ctx.lineWidth = 2.6; ctx.shadowColor = col; ctx.shadowBlur = 8;
        ctx.beginPath();
        for (let x=WX0;x<=WX1;x++){ const y=WY + A*Math.sin((x-WX0)/pxPerCycle*Math.PI*2 - wavePhase); x===WX0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
        ctx.stroke(); ctx.shadowBlur = 0;
        // one-wavelength bracket
        const bx0=WX0+4, bx1=bx0+pxPerCycle, by=WY+A+9;
        ctx.strokeStyle='rgba(87,83,78,0.7)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(bx0,by-4); ctx.lineTo(bx0,by); ctx.lineTo(bx1,by); ctx.lineTo(bx1,by-4); ctx.stroke();
        ctx.fillStyle='#7C6F5A'; ctx.font='600 10px Inter'; ctx.textAlign='center'; ctx.textBaseline='top';
        ctx.fillText('one wavelength (λ)', (bx0+bx1)/2, by+3);
      } else {
        ctx.fillStyle='#A0937B'; ctx.font='italic 12px Inter'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('Emit to see the light wave →', (WX0+WX1)/2, WY);
      }
      // ----- electron on the ladder -----
      const ex=EX, ey=curY;
      const g=ctx.createRadialGradient(ex,ey,0,ex,ey,18); g.addColorStop(0,'rgba(129,140,248,0.7)'); g.addColorStop(1,'rgba(129,140,248,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(ex,ey,18,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#6366f1'; ctx.beginPath(); ctx.arc(ex,ey,10,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='700 11px Roboto Mono'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('e⁻', ex, ey);
    };
    stage.append(el('div',{class:'tool-row'},[up,down]), status, specWrap, inquiry);
  }
});

// ---- Step 9: Relative atomic mass calculator ----
scenes.push({
  step: 'Step 9: Relative Atomic Mass (Aᵣ)',

  heading: 'Step 9: Relative Atomic Mass',
  notes: "The <strong>relative atomic mass (Aᵣ)</strong> is the <strong>weighted average</strong> of every natural isotope. Multiply each isotope's mass by its abundance as a decimal, add the results, then divide by the total abundance (usually 1.00 or 100).",

  build(stage) {
    const mk = (lab,val) => { const i=el('input',{type:'number',value:val,step:'any'}); return el('div',{class:'field'},[el('label',{},lab),i]); };
    const m1=mk('Isotope 1 mass',63), a1=mk('Abundance 1 (%)',69.2), m2=mk('Isotope 2 mass',65), a2=mk('Abundance 2 (%)',30.8);
    const steps = el('div',{class:'calc-steps'});
    const calc = () => {
      const M1=+m1.querySelector('input').value, A1=+a1.querySelector('input').value, M2=+m2.querySelector('input').value, A2=+a2.querySelector('input').value;
      const d1=A1/100, d2=A2/100, t1=M1*d1, t2=M2*d2, ar=t1+t2, tot=A1+A2;
      steps.innerHTML =
        `<div class="muted">Aᵣ = (mass × decimal abundance) summed</div>` +
        `<div>(${M1} × ${d1.toFixed(3)}) + (${M2} × ${d2.toFixed(3)})</div>` +
        `<div>= ${t1.toFixed(2)} + ${t2.toFixed(2)}</div>` +
        `<div class="res">Aᵣ = ${ar.toFixed(2)}</div>` +
        (Math.abs(tot-100)>0.5 ? `<div class="muted">note: abundances add to ${tot}%, should total 100%</div>` : '');
    };
    [m1,a1,m2,a2].forEach(f=>f.querySelector('input').addEventListener('input',calc));
    const btn = el('button',{class:'primary',onclick:calc},'Calculate Aᵣ');
    stage.append(
      el('div',{class:'eyebrow-sm'},'Copper: ⁶³Cu and ⁶⁵Cu'),
      el('div',{class:'iso-row'},[m1,a1]),
      el('div',{class:'iso-row'},[m2,a2]),
      btn, steps,
      el('div',{class:'caption'},'Change the numbers to weigh any two isotopes.'));
    calc();
  }
});

// ---- Step 10: Solving for percent abundance (Lithium walkthrough) ----
scenes.push({
  step: 'Step 10: Solving for Percent Abundance',
  seeLabel: 'Lithium walkthrough',
  heading: 'Step 10: Find an Unknown Abundance',
  notes: "When abundances are unknown, let one isotope be <strong>x</strong> and the other be <strong>1 − x</strong>. Plug both into the Aᵣ equation and solve for x. Then x and 1 − x are your two abundances.",
  notebook: "Follow the lithium walkthrough. Copy every line. Box the final answer: about <strong>5.9% Li-6 and 94.1% Li-7</strong>.",
  build(stage) {
    const stepsData = [
      { t:'The problem', c:'Lithium has two isotopes, Li-6 (mass 6) and Li-7 (mass 7). Its periodic-table mass is Aᵣ = 6.941. Find the abundance of each.' },
      { t:'Set the unknowns', c:'Let x = fraction of Li-6. Then the fraction of Li-7 must be (1 − x), because they add to 1.00.' },
      { t:'Write the Aᵣ equation', c:'6(x) + 7(1 − x) = 6.941' },
      { t:'Expand', c:'6x + 7 − 7x = 6.941' },
      { t:'Combine and solve', c:'−x + 7 = 6.941 → −x = −0.059 → x = 0.059' },
      { t:'Answer', c:'x = 0.059 → 5.9% Li-6, and 1 − x = 0.941 → 94.1% Li-7.' }
    ];
    let shown = 0;
    const list = el('div',{class:'calc-grid'});
    const status = el('div',{class:'pb-text'});
    const bar = el('div',{class:'pb-bar'},[el('div',{class:'pb-fill'})]);
    function renderStatus(){ status.textContent = shown<stepsData.length? `${shown} of ${stepsData.length} steps revealed` : `✓ All ${stepsData.length} steps revealed`;
      status.classList.toggle('complete', shown>=stepsData.length); bar.querySelector('.pb-fill').style.width = (shown/stepsData.length*100)+'%'; }
    function addStep(){ if(shown>=stepsData.length) return; const s=stepsData[shown];
      const card = el('div',{class:'q-card'},[ el('div',{class:'q-text'},[el('span',{class:'q-num'},(shown+1)+'.'), s.t]),
        el('div',{class:'reveal-content',style:'border-left-color:var(--accentBlue)'}, s.c) ]);
      list.append(card); shown++; renderStatus(); nextStepBtn.textContent = shown>=stepsData.length?'All steps shown':'Reveal next step'; nextStepBtn.disabled = shown>=stepsData.length; }
    const nextStepBtn = el('button',{class:'primary',onclick:addStep},'Reveal next step');
    stage.append(el('div',{class:'eyebrow-sm'},'Lithium: Aᵣ = 6.941'), nextStepBtn, list, el('div',{class:'pb-progress'},[bar,status]));
    renderStatus();
  }
});

// ---- Practice: 10 questions, alternating simple / challenge ----
scenes.push({
  step: 'Practice Questions',
  seeLabel: 'Practice questions',
  heading: 'Practice Questions',
  notes: "Ten questions that pull the whole simulation together. They alternate <strong>simple</strong> and <strong>challenge</strong>, and the last two are <strong>worked relative-abundance</strong> problems, one solving for the average mass and one solving for the percentages. Answer each in your notebook first, then reveal the worked solution and copy it down.",
  notebook: "Number your page <strong>1 to 10</strong>. Answer each question <strong>before</strong> you reveal it, then copy the solution underneath and fix anything you missed.",
  build(stage) {
    const qs = [
      { d:'Simple', q:'An atom has 11 protons. What element is it, and how many protons does every sodium atom have?',
        a:"<strong>Sodium (Na).</strong> The number of protons (the atomic number) is the element's identity, so 11 protons is always sodium. Every sodium atom has exactly <strong>11 protons</strong>." },
      { d:'Challenge', q:'Two ions are heated. One glows red (long wavelength), one glows violet (short wavelength). Whose electrons made the bigger energy drop? Explain.',
        a:'The <strong>violet</strong> one. Shorter wavelength means higher energy, and higher-energy light comes from a <strong>bigger fall</strong> between energy levels. The red glow came from a smaller energy drop.' },
      { d:'Simple', q:'Write the electron arrangement (shells) for sodium, which has 11 electrons.',
        a:"<strong>2, 8, 1.</strong> Shells fill from the inside out: 2 in the first, 8 in the second, 1 left over in the third. That single outer electron is sodium's valence electron." },
      { d:'Challenge', q:'Why does a heated atom emit only certain specific colors instead of a smooth rainbow?',
        a:"Because the energy levels are <strong>fixed (quantized)</strong>. An electron can only make certain jumps, and each jump releases one specific energy, which is one specific wavelength and color. The result is a set of sharp lines, the element's <strong>fingerprint</strong>, not a continuous rainbow." },
      { d:'Simple', q:'An atom has 17 protons and 18 neutrons. What is its mass number?',
        a:'Mass number = protons + neutrons = 17 + 18 = <strong>35</strong>.' },
      { d:'Challenge', q:'Carbon-12 and Carbon-14 are isotopes. What is the same, what is different, and which atom is heavier? Why?',
        a:'Same number of <strong>protons</strong> (6) and electrons, so both are carbon. Different number of <strong>neutrons</strong> (6 vs 8). <strong>Carbon-14 is heavier</strong> because mass number = protons + neutrons, and it has two more neutrons.' },
      { d:'Simple', q:'How many electrons are in ²³Na⁺?',
        a:'Sodium has 11 protons. A 1+ charge means it <strong>lost one electron</strong>, so 11 − 1 = <strong>10 electrons</strong>.' },
      { d:'Challenge', q:'Find the protons, neutrons, and electrons in ¹⁶O²⁻.',
        a:'<strong>8 protons</strong> (oxygen). Neutrons = 16 − 8 = <strong>8</strong>. The 2− charge means it <strong>gained 2 electrons</strong>, so 8 + 2 = <strong>10 electrons</strong>.' },
      { d:'Simple', q:'Worked — relative average. Chlorine is 75% mass-35 and 25% mass-37. Find its relative atomic mass (Aᵣ).',
        a:'Multiply each mass by its decimal abundance, then add:<br>(35 × 0.75) + (37 × 0.25)<br>= 26.25 + 9.25<br>= <strong>Aᵣ = 35.5</strong>.' },
      { d:'Challenge', q:'Worked — solving for percentages. Boron has isotopes B-10 and B-11 and a relative atomic mass of 10.8. Find the percentage of each isotope.',
        a:'Let x = fraction of B-10, so (1 − x) = fraction of B-11.<br>10x + 11(1 − x) = 10.8<br>10x + 11 − 11x = 10.8<br>−x = −0.2 &nbsp;→&nbsp; x = 0.2<br>So <strong>20% B-10 and 80% B-11</strong>.' }
    ];
    let done = 0;
    const bar = el('div',{class:'pb-bar'},[el('div',{class:'pb-fill'})]);
    const text = el('div',{class:'pb-text'}, `0 of ${qs.length} checked`);
    qs.forEach((item,i) => {

      const btn = el('button',{class:'reveal-btn'},'Show solution');
      const rev = el('div',{class:'reveal-content',hidden:'',html:item.a});
      btn.addEventListener('click',()=>{ if(!rev.hasAttribute('hidden')) return; rev.removeAttribute('hidden'); btn.textContent='Solution shown — copy it down'; btn.disabled=true;
        done++; bar.querySelector('.pb-fill').style.width=(done/qs.length*100)+'%';
        text.textContent = done===qs.length?`✓ All ${qs.length} checked`:`${done} of ${qs.length} checked`;
        text.classList.toggle('complete', done===qs.length); });
      stage.append(el('div',{class:'q-card'},[ el('div',{class:'q-text'},[el('span',{class:'q-num'},(i+1)+'.'), pill, item.q]), btn, rev ]));
    });
    stage.append(el('div',{class:'pb-progress'},[bar,text]));
  }
});

const QUESTIONS_ENDPOINT = 'PASTE_APPS_SCRIPT_WEB_APP_URL_HERE';

// ---- Step 12: Your Questions (launch the next lesson) ----
scenes.push({
  step: 'Step 12: Your Questions',
  seeLabel: 'Your questions',
  heading: 'Step 12: What Are You Wondering?',
  notes: "You have seen how protons and neutrons sit in the nucleus, how electrons fill shells, and how jumping electrons make the colors you saw in the flame test. Now turn it around. <strong>What are you still wondering?</strong> The best questions are the ones the simulation could not fully answer.",
  notebook: "Write <strong>at least 5 questions</strong> you still have in your notebook. Then type them here, add your <strong>name and class</strong>, and hit <strong>Submit</strong> so I get them before our next lesson. There are no wrong questions.",
  build(stage) {
    stage.append(el('div',{class:'summary-card',style:'border-left-color:var(--accentBlue)'},[
      el('div',{class:'sc-tag',style:'color:var(--accentBlue)'},'Launch the next lesson'),
      el('p',{},'Write your questions in your notebook, then type them here and hit Submit. I read every one before we start next class.')
    ]));
    const inS = 'font-family:var(--font-sans);font-size:14px;padding:9px 12px;border:1px solid var(--borderColor);border-radius:9px;background:#fff;color:var(--textPrimary)';
    const name = el('input',{type:'text',placeholder:'Your name',style:inS+';flex:2;min-width:0'});
    const klass = el('input',{type:'text',placeholder:'Class / period',style:inS+';flex:1;min-width:0'});
    stage.append(el('div',{style:'display:flex;gap:8px;margin-top:4px'},[name,klass]));
    const inputs = [];
    const wrap = el('div',{style:'display:flex;flex-direction:column;gap:8px;margin-top:8px'});
    for (let i=0;i<5;i++){
      const inp = el('input',{type:'text',placeholder:'I wonder...',style:inS+';flex:1;min-width:0'});
      inputs.push(inp);
      wrap.append(el('div',{style:'display:flex;align-items:center;gap:10px'},[ el('div',{class:'q-num',style:'min-width:20px'}, (i+1)+'.'), inp ]));
    }
    stage.append(wrap);
    const btn = el('button',{class:'primary',style:'margin-top:2px'},'Submit my questions');
    const msg = el('div',{class:'pb-text'});
    btn.addEventListener('click', async () => {
      const qs = inputs.map(i=>i.value.trim()).filter(Boolean);
      if(!name.value.trim() || !klass.value.trim()){ msg.textContent='Add your name and class first.'; msg.classList.remove('complete'); return; }
      if(!qs.length){ msg.textContent='Type at least one question first.'; msg.classList.remove('complete'); return; }
      btn.disabled=true; btn.textContent='Submitting...'; msg.textContent='';
      const payload = { app:'Atomic Structure', name:name.value.trim(), klass:klass.value.trim(), questions:qs, ts:new Date().toISOString() };
      try {
        if(QUESTIONS_ENDPOINT.indexOf('PASTE_')>=0) throw new Error('not-configured');
        await fetch(QUESTIONS_ENDPOINT, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload) });
        btn.textContent='✓ Submitted'; msg.textContent='Thanks! Your questions are in — keep your copy in your notebook.'; msg.classList.add('complete');
      } catch(err){
        btn.disabled=false; btn.textContent='Submit my questions';
        msg.textContent = err.message==='not-configured' ? 'Submissions are not connected yet — tell your teacher.' : 'Could not submit — check your connection and try again.';
        msg.classList.remove('complete');
      }
    });
    stage.append(el('div',{style:'display:flex;align-items:center;gap:12px;margin-top:2px'},[btn, msg]));
  }
});

// =====================================================
//  Nav controller
// =====================================================
const stageEl = $('#stage');
const stageLabel = $('#stageLabel');
const stepHeadingEl = $('#stepHeading');
const notesEl = $('#notes');
const notebookTextEl = $('#notebookText');
const stepIndicator = $('#stepIndicator');
const stepNumEl = $('#stepNum');
const stepTitleEl = $('#stepTitle');
const progressFill = $('#progressFill');
const prevBtn = $('#prevBtn');
const nextBtn = $('#nextBtn');
const resetBtn = $('#resetBtn');
let current = 0;
const pad2 = n => n < 10 ? '0'+n : ''+n;

function setScene(i) {
  current = i;
  currentTick = null;
  const s = scenes[i];
  stageEl.innerHTML = '';
  const shortTitle = s.heading.replace(/^Step \d+:\s*/, '');
  stageLabel.textContent = s.seeLabel || 'What you see';
  stepHeadingEl.textContent = 'Step ' + (i+1) + ': ' + shortTitle;
  stepNumEl.textContent = 'Step ' + pad2(i+1);
  stepTitleEl.textContent = shortTitle;
  notesEl.innerHTML = s.notes;
  notebookTextEl.innerHTML = s.notebook;
  stepIndicator.textContent = `${pad2(i+1)} / ${pad2(scenes.length)}`;
  progressFill.style.width = ((i+1)/scenes.length*100) + '%';
  prevBtn.disabled = i === 0;
  nextBtn.disabled = i === scenes.length-1;
  nextBtn.textContent = i === scenes.length-1 ? 'Done' : 'Next →';
  s.build(stageEl);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
prevBtn.addEventListener('click', () => { if (current>0) setScene(current-1); });
nextBtn.addEventListener('click', () => { if (current<scenes.length-1) setScene(current+1); });
resetBtn.addEventListener('click', () => setScene(0));
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' && current<scenes.length-1) setScene(current+1);
  if (e.key === 'ArrowLeft' && current>0) setScene(current-1);
});

setScene(0);
</script>
